{# templates/partials/fav_button.html #}
<button
  hx-post="{% url 'favorite_toggle' car.pk %}"
  hx-trigger="click"
  hx-swap="outerHTML"
  aria-label="{% if car.is_favorited %}Убрать{% else %}Добавить{% endif %}"
  class="absolute top-2 right-2 p-1 z-10 focus:outline-none"
>
  {% if car.is_favorited %}
    <svg xmlns="http://www.w3.org/2000/svg"
         width="20" height="18" viewBox="0 0 20 18"
         fill="currentColor"
         class="w-5 h-5 text-red-600">
      <path d="M14.44 0.0999756C12.63 0.0999756 11.01 0.979976 10 2.32998C8.99 0.979976 7.37 0.0999756 5.56 0.0999756C2.49 0.0999756 0 2.59998 0 5.68998C0 6.87998 0.19 7.97998 0.52 8.99998C2.1 14 6.97 16.99 9.38 17.81C9.72 17.93 10.28 17.93 10.62 17.81C13.03 16.99 17.9 14 19.48 8.99998C19.81 7.97998 20 6.87998 20 5.68998C20 2.59998 17.51 0.0999756 14.44 0.0999756Z"/>
    </svg>
  {% else %}
    <svg xmlns="http://www.w3.org/2000/svg"
         width="20" height="18" viewBox="0 0 20 18"
         fill="currentColor"
         class="w-5 h-5 text-gray-400 hover:text-red-600 transition-colors">
      <path d="M14.44 0.0999756C12.63 0.0999756 11.01 0.979976 10 2.32998C8.99 0.979976 7.37 0.0999756 5.56 0.0999756C2.49 0.0999756 0 2.59998 0 5.68998C0 6.87998 0.19 7.97998 0.52 8.99998C2.1 14 6.97 16.99 9.38 17.81C9.72 17.93 10.28 17.93 10.62 17.81C13.03 16.99 17.9 14 19.48 8.99998C19.81 7.97998 20 6.87998 20 5.68998C20 2.59998 17.51 0.0999756 14.44 0.0999756Z"/>
    </svg>
  {% endif %}
</button>
