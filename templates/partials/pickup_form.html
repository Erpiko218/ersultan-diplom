{# форма бронирования (pick‑up / drop‑off)  — отправляет GET на страницу списка машин #}
<form action="{% url 'car_list' %}" method="get"
      class="mt-8 grid md:grid-cols-[repeat(2,minmax(0,1fr))_auto] gap-3">

    {# ------ PICK‑UP ------ #}
    <div class="card bg-base-100 shadow p-4 space-y-3">
        <h3 class="font-semibold">Pick‑up</h3>

        <label class="form-control w-full">
            <span class="label-text">Локация</span>
            <input name="pickup_location" class="input input-bordered"
                   placeholder="Город, адрес"
                   value="{{ request.GET.pickup_location }}">
        </label>

        <label class="form-control w-full">
            <span class="label-text">Дата</span>
            <input type="date" name="pickup_date" class="input input-bordered"
                   value="{{ request.GET.pickup_date }}">
        </label>

        <label class="form-control w-full">
            <span class="label-text">Время</span>
            <input type="time" name="pickup_time" class="input input-bordered"
                   value="{{ request.GET.pickup_time }}">
        </label>
    </div>

    {# ------ DROP‑OFF ------ #}
    <div class="card bg-base-100 shadow p-4 space-y-3">
        <h3 class="font-semibold">Drop‑off</h3>

        <label class="form-control w-full">
            <span class="label-text">Локация</span>
            <input name="dropoff_location" class="input input-bordered"
                   placeholder="Город, адрес"
                   value="{{ request.GET.dropoff_location }}">
        </label>

        <label class="form-control w-full">
            <span class="label-text">Дата</span>
            <input type="date" name="dropoff_date" class="input input-bordered"
                   value="{{ request.GET.dropoff_date }}">
        </label>

        <label class="form-control w-full">
            <span class="label-text">Время</span>
            <input type="time" name="dropoff_time" class="input input-bordered"
                   value="{{ request.GET.dropoff_time }}">
        </label>
    </div>

    {# стрелка‑switch между блоками #}
    <div class="flex items-center justify-center">
        <button type="submit" class="btn btn-primary w-full md:w-auto">
            Найти авто
        </button>
    </div>
</form>
